---
# yaml-language-server: $schema=../../schemas/param-defs-schema.json

$schema: "../../schemas/param-defs-schema.json#"

chapter_name: Two

parameter_definitions:
  - name: ROSE_COLORS
    impl-def: ROSE_COLORS
    note: This is a note about the ROSE_COLORS parameter.
    description: This is a description about the ROSE_COLORS parameter. Here's some *bold text*.
    type: [RED, PINK, WHITE]
  - name: XLEN
    impl-defs: [XLEN1, XLEN2]
    type: [32, 64]
  - name: FOOBAR
    impl-defs: [FOOBAR_CH1_EXT_X, FOOBAR_CH2_EXT_Z]
    type: boolean
  - names: [ASIDLEN, ASIDLEN1, ASIDLEN2]
    impl-def: ASIDLEN
    range: [0, 16]
  - name: NO_IMPL_DEF
    note: This is a note for a parameter without any implementation-defined behavior. Here's an 2^32^ exponent.
    type: bit
    description: Parameter intentionally defined without implementation-defined behavior.
  - name: MOCK_INST_X
    impl-def: MOCK_INST_X
    type: boolean
    note: This is a Mock "X" instruction parameter.
  - name: BASE_RV32I
    impl-def: BASE_RV32I
    type: boolean
    note: This is a base RV32I parameter.
  - name: BASE_RV32I_RV64I
    impl-def: BASE_RV32I_RV64I
    type: boolean
    note: This is a base RV32I or RV64I parameter.
  - name: MOCK_CSR_X
    impl-def: MOCK_CSR_X
    type: boolean
    note: This is a Mock "X" CSR parameter.
  - name: MOCK_CSR_FIELD_Y
    impl-def: MOCK_CSR_FIELD_Y
    type: boolean
    note: This is a Mock "Y" CSR field parameter.
  - name: MOCK_EXT_DEP_A_ON_B
    impl-def: MOCK_EXT_DEP_A_ON_B
    type: boolean
    note: This is a Mock extension dependency parameter (A depends B).

csr_definitions:
  # Case 1a: Enum with list of potentially legal values.
  # Some values may be mandatory and some optional for an implementation but that isn't tracked here.
  # Returns 0x7fff if written with an illegal value.
  # Legal values use a mix of decimal, binary (0b11), and hex (0xffff_ffff) to test multibase support.
  - reg-name: foo
    field-name: ABC
    impl-def: FOO_ABC_WARL_ENUM
    enum:
      legal: [0, 0b11, 0xffff_ffff]
      illegal-write-return: 0x7fff

  # Case 1b: Enum with list of potentially legal values.
  # Ignores writes of illegal values (i.e. the write has no effect).
  # Legal values use decimal and hex (0xf0) to further test multibase support.
  - reg-name: foo
    field-name: DEF
    impl-def: FOO_DEF_WARL_ENUM
    enum:
      legal: [-1, 0xf0]
      illegal-write-ignore: true

  # Case 2: CSR field with width specified by a named parameter's value.
  - reg-name: foo
    field-name: GHI
    impl-def: FOO_GHI_WARL_WIDTH_UINT4TO8
    width: UINT_4TO8

  # Case 3a: CSR with some bits that are read-only and some bits that are read-write.
  # Any bit in the mask that is 1 is allowed to be read-only in an implementation.
  # The value specifies the read-only value.
  - reg-name: bar
    impl-def: BAR_WARL_READONLY_VALUE
    ro-mask: 0xF0F0F0F0
    ro-value: 0xFFFF_FFFF_FFFF_FFFF

  # Case 3b: Similar to Case 3a but the read-only value defaults to 0 if not specified.
  - reg-name: zort
    field-name: XYZ
    impl-def: ZORT_XYZ_WLRL_READONLY_ZERO
    ro-mask: 0b1111

  # Case 4: CSR field with no selector property (enum/width/ro-mask all omitted).
  - reg-name: qux
    field-name: QQQ
    impl-def: QUX_QQQ_WLRL_NO_SELECTOR
