---
# yaml-language-server: $schema=../../schemas/param-defs-schema.json

$schema: "../../schemas/param-defs-schema.json#"

chapter_name: Two

parameter_definitions:
  - name: ROSE_COLORS
    impl-def: ROSE_COLORS
    note: This is a note about the ROSE_COLORS parameter.
    description: This is a description about the ROSE_COLORS parameter. Here's some *bold text*.
    type: [RED, PINK, WHITE]
  - name: XLEN
    impl-defs: [XLEN1, XLEN2]
    type: [32, 64]
  - name: FOOBAR
    impl-defs: [FOOBAR_CH1_EXT_X, FOOBAR_CH2_EXT_Z]
    type: boolean
  - names: [ASIDLEN, ASIDLEN1, ASIDLEN2]
    impl-def: ASIDLEN
    range: [0, 16]
  - name: NO_IMPL_DEF
    note: This is a note for a parameter without any implementation-defined behavior. Here's an 2^32^ exponent.
    type: bit
    description: Parameter intentionally defined without implementation-defined behavior.
  - name: MOCK_INST_X
    impl-def: MOCK_INST_X
    type: boolean
    note: This is a Mock "X" instruction parameter.
  - name: BASE_RV32I
    impl-def: BASE_RV32I
    type: boolean
    note: This is a base RV32I parameter.
  - name: BASE_RV32I_RV64I
    impl-def: BASE_RV32I_RV64I
    type: boolean
    note: This is a base RV32I or RV64I parameter.
  - name: MOCK_CSR_X
    impl-def: MOCK_CSR_X
    type: boolean
    note: This is a Mock "X" CSR parameter.
  - name: MOCK_CSR_FIELD_Y
    impl-def: MOCK_CSR_FIELD_Y
    type: boolean
    note: This is a Mock "Y" CSR field parameter.
  - name: MOCK_EXT_DEP_A_ON_B
    impl-def: MOCK_EXT_DEP_A_ON_B
    type: boolean
    note: This is a Mock extension dependency parameter (A depends B).

csr_definitions:
  # Case 1a: Enum
  - reg-name: foo
    field-name: ABC
    type: LegalEnum
    impl-def: FOO_ABC_WARL_ENUM

  # Case 2: CSR field with width specified by a named parameter's value.
  - reg-name: foo
    field-name: GHI
    type: VarWidth
    width-parameter: UINT_4TO8
    impl-def: FOO_GHI_WARL_VAR_WIDTH

  # Case 3: CSR field with some bits that are read-only and some bits that are read-write.
  - reg-name: zort
    field-name: XYZ
    type: ConstMask
    impl-def: ZORT_XYZ_WLRL_RO_MASK

  # Case 4: CSR field that doesn't match any of the above cases.
  - reg-name: qux
    field-name: QQQ
    type: Other
    impl-def: QUX_QQQ_WLRL_OTHER
