---
# yaml-language-server: $schema=../../schemas/defs-schema.json

$schema: "../../schemas/defs-schema.json#"

# Used to create normative rules for test-ch2.adoc file.
chapter_name: Two

normative_rule_definitions:
  # Admonitions
  - name: admon1
    tag: "norm:admonition:single-paragraph-note"
  - name: admon2
    tag: "norm:admonition:no-anchors-in-notes:entire-note"
  - name: admon3
    tag: "norm:admonition:anchors-in-notes:entire-note"
  - name: admon4
    tags: ["norm:admonition:only-anchors-in-notes:note1", "norm:admonition:only-anchors-in-notes:note3"]
  - name: admon5
    description: One line description
    tags: ["norm:admonition:anchors-in-notes:note1", "norm:admonition:anchors-in-notes:note3"]

  # Implementation-defined behaviors (rules that allow choices)
  - name: ROSE_COLORS
    impl-def-behavior: true
    tag: "norm:ROSE_COLORS"
  - names: [XLEN1, XLEN2]
    impl-def-behavior: true
    tag: "norm:XLEN"
    kind: extension
    instance: MockExtZ
  - name: ASIDLEN
    impl-def-behavior: true
    tag: "norm:ASIDLEN"
    kind: extension
    instance: MockExtZ
  - name: FOOBAR_CH2_EXT_Z
    impl-def-behavior: true
    tag: "norm:foobar-ch2"
    kind: extension
    instance: MockExtZ
  - name: MOCK_INST_X
    impl-def-behavior: true
    tag: "norm:mock-inst-x"
    kind: instruction
    instance: MockInstX
  - name: BASE_RV32I
    impl-def-behavior: true
    tag: "norm:base-rv32i"
    kind: base
    instance: RV32I
  - name: BASE_RV32I_RV64I
    impl-def-behavior: true
    tag: "norm:base-rv32i-rv64i"
    kind: base
    instances: [RV32I, RV64I]
  - name: MOCK_CSR_X
    impl-def-behavior: true
    tag: "norm:mock-csr-x"
    kind: csr
    instance: MockCsrX
  - name: MOCK_CSR_FIELD_Y
    impl-def-behavior: true
    tag: "norm:mock-csr-field-y"
    kind: csr_field
    instance: MockCsrFieldY
  - name: MOCK_EXT_DEP_A_ON_B
    impl-def-behavior: true
    tag: "norm:mock-ext-dep-A-on-B"
    kind: extension_dependency
    instance: MockExtDepAOnB

  # CSR field types
  - name: CSR_FIELD_WARL1
    tag: "norm:csr_field_warl1"
    impl-def-behavior: true
    impl-def-category: WARL
    kind: csr_field
    instance: MockWARL1
  - name: CSR_FIELD_WLRL
    tag: "norm:csr_field_wlrl"
    impl-def-behavior: true
    impl-def-category: WLRL
    kind: csr_field
    instance: MockWLRL
  - name: CSR_FIELD_WARL2
    tag: "norm:csr_field_warl2"
    impl-def-behavior: true
    impl-def-category: WARL
